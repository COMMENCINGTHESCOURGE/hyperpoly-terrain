name: 🐛 Bug Report
description: Report a breakdown in continuity or GPU simulation.
title: "[Bug]: <Short description>"
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Since MANIFOLD relies on strict GPU-native simulation, bugs often manifest as visual artifacts or constraint violations.

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Browser, GPU model (e.g., Windows 11, Chrome 114, RTX 3080)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description of the breakdown
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Provide clear steps or the specific WGSL state that triggers the issue.
      placeholder: |
        1. Open index.html
        2. Set rain parameter to 5.0
        3. Observe...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Console Logs / GPU Errors
      description: Paste any WebGPU validation errors from the console.
      render: shell
    validations:
      required: false
