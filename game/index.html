<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOVEREIGN RESONANCE - Phase 1</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{overflow:hidden;background:#050508;font-family:'Courier New',monospace}
canvas{display:block}
#hud{position:fixed;top:16px;left:16px;color:#e0e0ff;font-size:13px;pointer-events:none;z-index:10;text-shadow:0 0 8px rgba(0,200,255,.8); border: 1px solid rgba(0,200,255,0.3); background: rgba(0,10,20,0.6); padding: 12px; border-radius: 4px; backdrop-filter: blur(4px);}
#hud div{margin:4px 0;opacity:.95}
#crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:8px;height:8px;pointer-events:none;z-index:10}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(0,210,255,.8);box-shadow: 0 0 4px rgba(0,210,255,1);}
#crosshair::before{width:2px;height:100%;left:3px;top:0}
#crosshair::after{width:100%;height:2px;left:0;top:3px}
</style>
</head>
<body>
<div id="hud">
  <div style="color:#0df; font-weight:bold; margin-bottom: 8px;">SOVEREIGN RESONANCE v1.0</div>
  <div id="hud-coords">TENSOR: 0, 0, 0</div>
  <div id="hud-status">TOPOLOGY: SPHERICAL MANIFOLD</div>
  <div id="hud-time">LATTICE: STABLE</div>
  <div style="font-size:10px; color:#88c; margin-top: 10px;">[LAYER 0]: 4D PARALLAX VOID</div>
  <div style="font-size:10px; color:#88c;">[LAYER 1]: TENSOR12 ECOLOGY</div>
  <div style="font-size:10px; color:#88c;">[LAYER 2]: HUD COMPOSITE</div>
</div>
<div id="crosshair"></div>

<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js"}}
</script>

<script type="module">
import * as THREE from 'three';

// ── NOISE (value noise + fractal) ──
const noisePerm = new Uint8Array(512);
(()=>{const p=[];for(let i=0;i<256;i++)p[i]=i;for(let i=255;i>0;i--){const j=Math.floor(Math.random()*(i+1));[p[i],p[j]]=[p[j],p[i]]}for(let i=0;i<512;i++)noisePerm[i]=p[i&255]})();
function fade(t){return t*t*t*(t*(t*6-15)+10)}
function lerp(a,b,t){return a+t*(b-a)}
function grad(hash,x,y,z){const h=hash&15;const u=h<8?x:y;const v=h<4?y:h===12||h===14?x:z;return ((h&1)?-u:u)+((h&2)?-v:v)}
function noise3D(x,y,z){const X=Math.floor(x)&255,Y=Math.floor(y)&255,Z=Math.floor(z)&255;x-=Math.floor(x);y-=Math.floor(y);z-=Math.floor(z);const u=fade(x),v=fade(y),w=fade(z);const A=noisePerm[X]+Y,AA=noisePerm[A]+Z,AB=noisePerm[A+1]+Z,B=noisePerm[X+1]+Y,BA=noisePerm[B]+Z,BB=noisePerm[B+1]+Z;return lerp(lerp(lerp(grad(noisePerm[AA],x,y,z),grad(noisePerm[BA],x-1,y,z),u),lerp(grad(noisePerm[AB],x,y-1,z),grad(noisePerm[BB],x-1,y-1,z),u),v),lerp(lerp(grad(noisePerm[AA+1],x,y,z-1),grad(noisePerm[BA+1],x-1,y,z-1),u),lerp(grad(noisePerm[AB+1],x,y-1,z-1),grad(noisePerm[BB+1],x-1,y-1,z-1),u),v),w)}
function fbm(x,y,z,oct=4){let v=0,a=1,f=1;for(let i=0;i<oct;i++){v+=noise3D(x*f,y*f,z*f)*a;a*=.5;f*=2}return v}

// ── WORLD CONSTANTS ──
const PLANET_RADIUS = 40; // Spherical topology base
const WATER_LEVEL = 0.5;

// ── SCENE SETUP ──
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050508);
scene.fog = new THREE.Fog(0x050508, 40, 150);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 500);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

// ── LAYER 0: PARALLAX STARFIELD (From starfield_v3.py) ──
const parallaxLayers = [
  {count: 4000, dist: 120, size: 0.15, color: 0x6699ff},
  {count: 3000, dist: 160, size: 0.25, color: 0x99ccff},
  {count: 2000, dist: 220, size: 0.40, color: 0xffeebb},
  {count: 1000, dist: 300, size: 0.60, color: 0xffffff}
];

const starsGroup = new THREE.Group();
parallaxLayers.forEach(layer => {
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(layer.count * 3);
  for(let i=0; i<layer.count; i++){
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos((Math.random() * 2) - 1);
    const r = layer.dist;
    pos[i*3] = r * Math.sin(phi) * Math.cos(theta);
    pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    pos[i*3+2] = r * Math.cos(phi);
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const mat = new THREE.PointsMaterial({
    size: layer.size, 
    color: layer.color, 
    transparent: true, 
    opacity: 0.8,
    sizeAttenuation: true
  });
  starsGroup.add(new THREE.Points(geo, mat));
});
scene.add(starsGroup);

// ── LIGHTING ──
const ambient = new THREE.AmbientLight(0x223344, 1.2);
scene.add(ambient);
const sun = new THREE.DirectionalLight(0xffeedd, 3.0);
sun.position.set(150, 80, 80);
sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.near = 10;
sun.shadow.camera.far = 300;
sun.shadow.camera.left = -60; sun.shadow.camera.right = 60;
sun.shadow.camera.top = 60; sun.shadow.camera.bottom = -60;
scene.add(sun);

// ── LAYER 1: SPHERICAL MANIFOLD TERRAIN ──
const terrainGeo = new THREE.IcosahedronGeometry(PLANET_RADIUS, 64);
const positions = terrainGeo.attributes.position;
const colors = new Float32Array(positions.count * 3);

// Inverse Cubemap Projection: map 3D direction vector back to (face, u, v)
function dirToFaceUV(nx, ny, nz) {
  let absX = Math.abs(nx);
  let absY = Math.abs(ny);
  let absZ = Math.abs(nz);
  let face = 0;
  let uVal = 0, vVal = 0;

  if (absX >= absY && absX >= absZ) {
    if (nx > 0) {
      face = 0;
      uVal = -nz / nx;
      vVal = -ny / nx;
    } else {
      face = 1;
      uVal = nz / -nx;
      vVal = -ny / -nx;
    }
  } else if (absY >= absX && absY >= absZ) {
    if (ny > 0) {
      face = 2;
      uVal = nx / ny;
      vVal = nz / ny;
    } else {
      face = 3;
      uVal = nx / -ny;
      vVal = -nz / -ny;
    }
  } else {
    if (nz > 0) {
      face = 4;
      uVal = nx / nz;
      vVal = -ny / nz;
    } else {
      face = 5;
      uVal = -nx / -nz;
      vVal = -ny / -nz;
    }
  }

  let u = (uVal + 1.0) / 2.0;
  let v = (vVal + 1.0) / 2.0;
  return { face, u, v };
}

let seededData = null;

function getHeight(nx, ny, nz){
  if (seededData) {
    let { face, u, v } = dirToFaceUV(nx, ny, nz);
    let N = seededData.N;
    let c = Math.min(N - 1, Math.max(0, Math.floor(u * N)));
    let r = Math.min(N - 1, Math.max(0, Math.floor(v * N)));
    let cell = seededData.faces[face][r][c];
    // Scale elevations properly relative to sphere core baseline of 30.0
    return cell.rock + cell.soil + cell.sand - 30.0;
  }
  const h = fbm(nx * 1.5, ny * 1.5, nz * 1.5, 6);
  const ridge = Math.abs(h) * 3.5;
  const basin = fbm(nx * 4.0, ny * 4.0, nz * 4.0, 3) * 2.5;
  return ridge * 5.0 + basin - 1.0;
}

function biomeColor(h, nx, ny, nz){
  if (seededData) {
    let { face, u, v } = dirToFaceUV(nx, ny, nz);
    let N = seededData.N;
    let c = Math.min(N - 1, Math.max(0, Math.floor(u * N)));
    let r = Math.min(N - 1, Math.max(0, Math.floor(v * N)));
    let cell = seededData.faces[face][r][c];
    
    // Dynamic biological splatting colors
    if (cell.water > 0.5) return [0.1, 0.4, 0.65]; // active water pools
    if (cell.prey > 0.35 && cell.pred > 0.04) return [0.65, 0.0, 0.95]; // biological hotspots (purple)
    if (cell.prey > 0.15) return [0.12, 0.62, 0.22]; // lush biomass vegetation (emerald green)
    if (cell.stress > 0.8) return [0.85, 0.22, 0.12]; // terrain geological stress fault (red)
    if (cell.flux > 24.0) return [0.92, 0.55, 0.02]; // dynamic thermal vent (orange)
    return [0.38, 0.32, 0.26]; // dry organic soil nutrients
  }
  if(h < WATER_LEVEL + 0.2) return [0.1, 0.5, 0.6]; // shore
  if(h < 1.5) return [0.15, 0.7, 0.3]; // grass
  if(h < 3.0) return [0.35, 0.3, 0.25]; // rock
  if(h < 4.5) return [0.2, 0.15, 0.3]; // dark basalt
  return [0.0, 0.8, 1.0]; // bio-luminescent peaks
}

function applySeededTerrain(data) {
  seededData = data;
  for(let i=0;i<positions.count;i++){
    let vx = positions.getX(i), vy = positions.getY(i), vz = positions.getZ(i);
    let d = Math.sqrt(vx*vx + vy*vy + vz*vz);
    let nx = vx/d, ny = vy/d, nz = vz/d;
    
    let h = getHeight(nx, ny, nz);
    let newD = PLANET_RADIUS + h;
    
    positions.setXYZ(i, nx*newD, ny*newD, nz*newD);
    const [r,g,b] = biomeColor(h, nx, ny, nz);
    colors[i*3]=r; colors[i*3+1]=g; colors[i*3+2]=b;
  }
  terrainGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  terrainGeo.attributes.position.needsUpdate = true;
  terrainGeo.attributes.color.needsUpdate = true;
  terrainGeo.computeVertexNormals();

  console.log("[Seed] Bound 12-channel Spherical Seed successfully.");
  const statusEl = document.getElementById('hud-status');
  if(statusEl) {
    statusEl.textContent = "TOPOLOGY: SEEDED SPHERICAL MANIFOLD";
    statusEl.style.color = "#0df";
    statusEl.style.textShadow = "0 0 8px rgba(0, 220, 255, 0.8)";
  }
}

for(let i=0;i<positions.count;i++){
  let vx = positions.getX(i), vy = positions.getY(i), vz = positions.getZ(i);
  let d = Math.sqrt(vx*vx + vy*vy + vz*vz);
  let nx = vx/d, ny = vy/d, nz = vz/d;
  
  let h = getHeight(nx, ny, nz);
  let newD = PLANET_RADIUS + h;
  
  positions.setXYZ(i, nx*newD, ny*newD, nz*newD);
  const [r,g,b] = biomeColor(h, nx, ny, nz);
  colors[i*3]=r; colors[i*3+1]=g; colors[i*3+2]=b;
}
terrainGeo.setAttribute('color', new THREE.BufferAttribute(colors,3));
terrainGeo.computeVertexNormals();

const terrainMat = new THREE.MeshStandardMaterial({
  vertexColors:true, flatShading:true, roughness:0.8, metalness:0.1,
  emissive: 0x001122, emissiveIntensity: 0.2
});
const terrain = new THREE.Mesh(terrainGeo, terrainMat);
terrain.receiveShadow = true;
scene.add(terrain);

// ── WATER SPHERE ──
const waterGeo = new THREE.IcosahedronGeometry(PLANET_RADIUS + WATER_LEVEL, 32);
const waterMat = new THREE.MeshStandardMaterial({
  color:0x00aaff, roughness:0.1, metalness:0.8, 
  transparent:true, opacity:0.65, flatShading:true,
  emissive: 0x004488, emissiveIntensity: 0.5
});
const water = new THREE.Mesh(waterGeo, waterMat);
scene.add(water);

// ── PLAYER (Spherical Controller) ──
const player = new THREE.Group();
const bodyGeo = new THREE.CapsuleGeometry(0.3, 0.7, 4, 8);
const bodyMat = new THREE.MeshStandardMaterial({color:0x00ddff, flatShading:true, roughness:0.5, emissive:0x0055aa});
const body = new THREE.Mesh(bodyGeo, bodyMat);
body.position.y = 0.65;
body.castShadow = true;
player.add(body);

// Start player at North Pole
player.position.set(0, PLANET_RADIUS + 5, 0);
scene.add(player);

const state = {
  speed: 16.0,
  rotX: 0
};

// ── INPUT ──
const keys = {};
window.addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;e.preventDefault()});
window.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;e.preventDefault()});

let mouseLocked = false;
renderer.domElement.addEventListener('click',()=>{renderer.domElement.requestPointerLock()});
document.addEventListener('pointerlockchange',()=>{mouseLocked=document.pointerLockElement===renderer.domElement});

let mx=0,my=0;
document.addEventListener('mousemove',e=>{if(mouseLocked){mx+=e.movementX*0.002;my-=e.movementY*0.002;}});

// ── GAME LOOP ──
const clock = new THREE.Clock();
const upVec = new THREE.Vector3();
const forwardVec = new THREE.Vector3();
const rightVec = new THREE.Vector3();
const playerQuat = new THREE.Quaternion();

// Initial alignment
player.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), new THREE.Vector3(0,1,0));

function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.1);

  // W-dimension transit illusion
  starsGroup.rotation.y += dt * 0.01;
  starsGroup.rotation.x += dt * 0.005;

  // 1. Determine local Up vector
  upVec.copy(player.position).normalize();

  // 2. Camera Yaw (rotate player around local UP)
  if(mouseLocked) {
    const yawQuat = new THREE.Quaternion().setFromAxisAngle(upVec, -mx * 1.5);
    player.quaternion.premultiply(yawQuat);
    state.rotX += my * 1.5;
    state.rotX = Math.max(-1.2, Math.min(1.2, state.rotX));
    mx = 0; my = 0;
  }

  // Calculate forward and right
  const localForward = new THREE.Vector3(0, 0, -1).applyQuaternion(player.quaternion);
  forwardVec.copy(localForward).projectOnPlane(upVec).normalize();
  rightVec.crossVectors(forwardVec, upVec).normalize();

  const moveDir = new THREE.Vector3();
  if(keys['w']||keys['arrowup']) moveDir.add(forwardVec);
  if(keys['s']||keys['arrowdown']) moveDir.sub(forwardVec);
  if(keys['a']||keys['arrowleft']) moveDir.add(rightVec);
  if(keys['d']||keys['arrowright']) moveDir.sub(rightVec);

  if(moveDir.lengthSq() > 0) moveDir.normalize();

  // 3. Spherical Movement
  const targetVel = moveDir.multiplyScalar(state.speed * dt);
  player.position.add(targetVel);

  // 4. Gravity & Ground Clamp
  upVec.copy(player.position).normalize();
  
  const h = getHeight(upVec.x, upVec.y, upVec.z);
  const targetRadius = Math.max(PLANET_RADIUS + h, PLANET_RADIUS + WATER_LEVEL) + 0.1;
  player.position.copy(upVec).multiplyScalar(targetRadius);

  // 5. Align player upright to the sphere normal
  // Calculate quaternion that rotates local Y to upVec, while preserving forward direction
  const m = new THREE.Matrix4();
  m.lookAt(new THREE.Vector3(0,0,0), forwardVec, upVec);
  player.quaternion.setFromRotationMatrix(m);

  // 6. Camera Follow
  const camDist = 8;
  const camHeight = 3.5;
  
  const camOffset = upVec.clone().multiplyScalar(camHeight).sub(forwardVec.clone().multiplyScalar(camDist));
  const pitchAxis = rightVec.clone();
  camOffset.applyAxisAngle(pitchAxis, state.rotX);

  const desiredCamPos = player.position.clone().add(camOffset);
  camera.position.lerp(desiredCamPos, 8 * dt);
  camera.lookAt(player.position.clone().add(upVec.clone().multiplyScalar(1.5)));

  // Update HUD
  const p = player.position;
  document.getElementById('hud-coords').textContent = `TENSOR: ${p.x.toFixed(1)}, ${p.y.toFixed(1)}, ${p.z.toFixed(1)}`;

  renderer.render(scene, camera);
}

// ── RESIZE ──
window.addEventListener('resize',()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Load 12-channel Spherical Seed if available
fetch('spherical_seed.json')
  .then(res => res.json())
  .then(data => applySeededTerrain(data))
  .catch(err => console.log("[Seed] Fallback enabled. Run scripts/run_spherical_prototype.py to generate seed: ", err));

animate();
</script>
</body>
</html>
