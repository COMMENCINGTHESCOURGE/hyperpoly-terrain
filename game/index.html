<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HYPERPOLY — The Block / Vault Compound 7</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: monospace; }
  canvas#wgpu-canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; }
  canvas#hud-canvas { display: block; position: fixed; top: 0; left: 0; z-index: 2; pointer-events: none; }
  #overlay {
    position: fixed; inset: 0; z-index: 10;
    background: rgba(0,0,0,0.85);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: #aac; cursor: pointer; gap: 12px;
  }
  #overlay h2 { font-size: 22px; letter-spacing: 4px; color: #7af; }
  #overlay p { font-size: 13px; color: #5a7a9a; }
  #overlay .btn {
    margin-top: 10px; padding: 10px 28px; border: 1px solid #4af;
    color: #4af; font-size: 14px; letter-spacing: 2px;
    background: transparent; cursor: pointer; font-family: monospace;
  }
  #overlay .btn:hover { background: rgba(64,170,255,0.1); }
  #hud {
    position: fixed; bottom: 16px; left: 16px; z-index: 3;
    color: #4af; font-size: 11px; letter-spacing: 1px;
    display: none; text-shadow: 0 0 8px #4af;
  }
  #underwater-overlay {
    position: fixed; inset: 0; z-index: 4;
    background: rgba(0,20,40,0.35); pointer-events: none;
    display: none;
  }
  #crosshair {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    z-index: 3; pointer-events: none; display: none;
  }
  #crosshair::before, #crosshair::after {
    content: ''; position: absolute; background: rgba(255,255,255,0.5);
  }
  #crosshair::before { width: 2px; height: 12px; left: -1px; top: -6px; }
  #crosshair::after { width: 12px; height: 2px; left: -6px; top: -1px; }
  #loader {
    position: fixed; inset: 0; z-index: 20;
    display: flex; align-items: center; justify-content: center;
    color: #7af; font-size: 14px; letter-spacing: 2px;
    background: rgba(0,0,0,0.9);
  }
</style>
</head>
<body>
<div id="loader">GENERATING WORLD...</div>
<div id="overlay">
  <h2>⚡ HYPERPOLY v13</h2>
  <p>WASD — Move &nbsp;|&nbsp; Mouse — Look &nbsp;|&nbsp; ESC — Unlock</p>
  <p style="font-size:11px;color:#5a7a9a;margin-top:8px;">
    The Block (NE) · Vault Compound 7 (SW) · The Between
  </p>
  <button class="btn" onclick="startScene()">ENTER</button>
</div>
<div id="underwater-overlay"></div>
<div id="crosshair"></div>
<div id="hud">
  <span id="hud-pos">POS: 0, 0</span> &nbsp;|&nbsp;
  <span id="hud-elev">ELEV: 0.0</span> &nbsp;|&nbsp;
  <span id="hud-biome">BIOME: —</span> &nbsp;|&nbsp;
  FPS: <span id="hud-fps">0</span>
</div>
<canvas id="wgpu-canvas"></canvas>

<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>

<script type="module">
import * as THREE from 'three';
import { HyperPolyGeology } from './compute/hyperpoly_geology.js';
import { Phase5Extractor } from './compute/phase5_extractor/phase5_host.js';
import { Phase5Draw } from './compute/phase5_extractor/phase5_draw.js';
import { TerrainRenderer } from './render/terrain_renderer.js';

// ═══════════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════════
const WORLD = 256; // matches 256³ voxel grid
const WATER_LEVEL = -0.6;
const FOG_DENSITY = 0.018;
const NUM_RAIN = 700;
const DRAW_DIST = 120;

// ═══════════════════════════════════════════════════════════════
// BIOME HELPERS — The Block (NE) & Vault Compound 7 (SW)
// ═══════════════════════════════════════════════════════════════
const BIOME_BLOCK = 0;
const BIOME_VAULT = 1;
const BIOME_WILD = 2;

function getBiome(x, z) {
  const wx = ((x % WORLD) + WORLD) % WORLD;
  const wz = ((z % WORLD) + WORLD) % WORLD;
  if (wx >= 112 && wx < 192 && wz >= 48 && wz < 128) return BIOME_BLOCK;
  if (wx >= 64 && wx < 144 && wz >= 128 && wz < 208) return BIOME_VAULT;
  return BIOME_WILD;
}

// ── Biome-aware terrain material generator ──
// Returns [density, cohesion, ice, organic, water, temperature]
// The 6-channel tensor used by the hyperpoly compute pipeline.
function getBiomeMaterial(bx, by, bz, worldX, worldZ) {
  const biome = getBiome(worldX, worldZ);
  const n = (bx, bz) => 0.5 + 0.5 * Math.sin(bx * 3 + bz * 2 + by * 1.5);

  switch (biome) {
    case BIOME_BLOCK: {
      // Concrete plateau — flat, hard, dense
      // Surface height ~2.5, drops to bedrock at by=2
      const surfaceY = 28; // 2.5 * 16 = 40 in brick coords → 2.5 world height
      const distFromSurface = Math.abs(by - surfaceY);
      const isSurface = distFromSurface < 2;
      const density = isSurface ? 0.85 + n(bx, bz) * 0.15 : 0.9 + n(bx, bz) * 0.1;
      const cohesion = isSurface ? 0.5 + n(bx, bz) * 0.2 : 0.7 + n(bx, bz) * 0.2;
      const ice = 0.05 + n(bx, bz) * 0.05;
      const organic = 0.02;
      const water = 0.1;
      // Warm from neon electronics
      const temperature = 0.6 + n(bx, bz) * 0.2;
      return [density, cohesion, ice, organic, water, temperature];
    }
    case BIOME_VAULT: {
      // Industrial compound — metal structures, amber glow
      // Flatter than Block, with pillar-like high points
      const surfaceY = 27;
      const distFromSurface = Math.abs(by - surfaceY);
      const isSurface = distFromSurface < 2;
      const pillar = (bx % 8 < 1 || bz % 8 < 1) && distFromSurface < 4 ? 0.3 : 0;
      const density = isSurface ? 0.9 + pillar : 0.85 + pillar * 0.5;
      // High cohesion — metal is strong
      const cohesion = 0.7 + 0.2 * Math.sin(bx * 1.5 + bz * 2.3);
      const ice = 0.02;
      const organic = 0.01;
      const water = 0.05;
      // Warm amber — machinery running
      const temperature = 0.5 + 0.3 * (0.5 + 0.5 * Math.sin(bx * 0.7 + bz * 0.9));
      return [density, cohesion, ice, organic, water, temperature];
    }
    default: {
      // The Between — wild terrain with noise-driven shapes
      const h = 0.5 + 0.5 * Math.sin(bx * 3 + by * 2 + bz * 4);
      const c = 0.3 + 0.3 * Math.cos(bx * 2 + by * 5 + bz * 3);
      return [
        h, c,
        0.5 - c * 0.3, 0.5 - c * 0.3, 0.5 - c * 0.3,
        0.0,
      ];
    }
  }
}

// ═══════════════════════════════════════════════════════════════
// THREE.JS — Sky, Water, Rain, HUD (overlay canvas)
// ═══════════════════════════════════════════════════════════════
const scene = new THREE.Scene();
const fogColor = new THREE.Color(0x000d1a);
scene.fog = new THREE.FogExp2(fogColor, FOG_DENSITY);
scene.background = fogColor;

const cam = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, DRAW_DIST);

const renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.domElement.style.position = 'fixed';
renderer.domElement.style.top = '0';
renderer.domElement.style.left = '0';
renderer.domElement.style.zIndex = '2';
renderer.domElement.style.pointerEvents = 'none';
document.body.appendChild(renderer.domElement);

// ── Water plane ──
const waterGeo = new THREE.PlaneGeometry(WORLD * 1.5, WORLD * 1.5, 80, 80);
waterGeo.rotateX(-Math.PI / 2);
const waterMat = new THREE.MeshLambertMaterial({ color: 0x001a2e, transparent: true, opacity: 0.72, depthWrite: false });
const water = new THREE.Mesh(waterGeo, waterMat);
water.position.set(WORLD / 2, WATER_LEVEL, WORLD / 2);
scene.add(water);

function animateWater(t) {
  const pos = waterGeo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i) + WORLD / 2;
    const z = pos.getZ(i) + WORLD / 2;
    pos.setY(i, Math.sin(t * 1.5 + x * 0.3 + z * 0.3) * 0.06);
  }
  pos.needsUpdate = true;
}

// ── Rain ──
const rainGeo = new THREE.BufferGeometry();
const rainPos = new Float32Array(NUM_RAIN * 3);
for (let i = 0; i < NUM_RAIN; i++) {
  rainPos[i*3] = (Math.random() - 0.5) * 50;
  rainPos[i*3+1] = Math.random() * 25;
  rainPos[i*3+2] = (Math.random() - 0.5) * 50;
}
rainGeo.setAttribute('position', new THREE.BufferAttribute(rainPos, 3));
const rainMat = new THREE.PointsMaterial({ color: 0x5566aa, size: 0.08, transparent: true, opacity: 0.35 });
const rain = new THREE.Points(rainGeo, rainMat);
scene.add(rain);

function animateRain(cp) {
  const rp = rainGeo.attributes.position;
  for (let i = 0; i < NUM_RAIN; i++) {
    rp.array[i*3+1] -= 0.4;
    if (rp.array[i*3+1] < cp.y - 8) {
      rp.array[i*3]   = cp.x + (Math.random() - 0.5) * 50;
      rp.array[i*3+1] = cp.y + 18;
      rp.array[i*3+2] = cp.z + (Math.random() - 0.5) * 50;
    }
  }
  rp.needsUpdate = true;
}

// ── Lighting ──
const ambLight = new THREE.AmbientLight(0x112233, 1.2);
scene.add(ambLight);
const dirLight = new THREE.DirectionalLight(0x2244aa, 0.8);
dirLight.position.set(50, 80, 50);
scene.add(dirLight);

// ── Sky / Fog per biome ──
function updateBiomeLighting(biome, t) {
  switch (biome) {
    case BIOME_BLOCK:
      // Neon-dark — magenta tinted
      scene.fog.color.setHex(0x1a0011);
      scene.background.setHex(0x1a0011);
      scene.fog.density = 0.025;
      ambLight.color.setHex(0x442244);
      ambLight.intensity = 0.6;
      dirLight.color.setHex(0xff44aa);
      dirLight.intensity = 0.5;
      break;
    case BIOME_VAULT:
      // Amber industrial — warm fog
      scene.fog.color.setHex(0x1a0e00);
      scene.background.setHex(0x1a0e00);
      scene.fog.density = 0.022;
      ambLight.color.setHex(0x443322);
      ambLight.intensity = 0.5;
      dirLight.color.setHex(0xff8800);
      dirLight.intensity = 0.4;
      break;
    default:
      // The Between — deep blue
      scene.fog.color.setHex(0x000d1a);
      scene.background.setHex(0x000d1a);
      scene.fog.density = FOG_DENSITY;
      ambLight.color.setHex(0x112233);
      ambLight.intensity = 1.2;
      dirLight.color.setHex(0x2244aa);
      dirLight.intensity = 0.8;
      break;
  }
}
let lightningTimer = 0;
const normFog = new THREE.Color(0x000d1a);
const litFog = new THREE.Color(0x8888bb);

function tickLightning() {
  if (lightningTimer > 0) {
    lightningTimer--;
    scene.fog.color.copy(litFog);
    scene.background = litFog;
    scene.fog.density = 0.008;
    ambLight.intensity = 3.5;
  } else {
    scene.fog.color.copy(normFog);
    scene.background = normFog;
    scene.fog.density = FOG_DENSITY;
    ambLight.intensity = 1.2;
    if (Math.random() < 0.003) lightningTimer = 3 + Math.floor(Math.random() * 8);
  }
}

// ═══════════════════════════════════════════════════════════════
// BOOT WEBGPU
// ═══════════════════════════════════════════════════════════════
async function main() {
  const wgpuCanvas = document.getElementById('wgpu-canvas');
  wgpuCanvas.width = window.innerWidth;
  wgpuCanvas.height = window.innerHeight;

  const adapter = await navigator.gpu.requestAdapter();
  if (!adapter) {
    document.getElementById('loader').textContent = 'WebGPU not supported.';
    return;
  }
  const requiredLimits = {};
  if (adapter.limits.maxComputeInvocationsPerWorkgroup >= 512) {
    requiredLimits.maxComputeInvocationsPerWorkgroup = 512;
  }
  const device = await adapter.requestDevice({ requiredLimits });
  const context = wgpuCanvas.getContext('webgpu');
  const format = navigator.gpu.getPreferredCanvasFormat();
  context.configure({ device, format, alphaMode: 'opaque' });

  const depthTexture = device.createTexture({
    size: [window.innerWidth, window.innerHeight],
    format: 'depth24plus',
    usage: GPUTextureUsage.RENDER_ATTACHMENT,
  });

  // ═══════════════════════════════════════════════════════════════
  // WORLD OVERLAY — The Block markers, Vault beacons, lore HUD
  // ═══════════════════════════════════════════════════════════════
  const overlayCanvas = document.createElement('canvas');
  overlayCanvas.id = 'world-overlay';
  overlayCanvas.style.cssText = 'display:block;position:fixed;top:0;left:0;z-index:5;pointer-events:none;';
  document.body.appendChild(overlayCanvas);
  const octx = overlayCanvas.getContext('2d');
  function resizeOverlay() {
    overlayCanvas.width = window.innerWidth;
    overlayCanvas.height = window.innerHeight;
  }
  resizeOverlay();
  window.addEventListener('resize', resizeOverlay);

  // Block neon markers
  const blockMarkers = [];
  for (let i = 0; i < 60; i++) {
    blockMarkers.push({ x: 112 + Math.random() * 80, z: 48 + Math.random() * 80, phase: Math.random() * Math.PI * 2 });
  }
  // Vault amber beacons
  const vaultBeacons = [];
  for (let i = 0; i < 40; i++) {
    vaultBeacons.push({ x: 64 + Math.random() * 80, z: 128 + Math.random() * 80, phase: Math.random() * Math.PI * 2 });
  }
  // Armored Defender patrol
  const defender = { x: 140, z: 80, angle: Math.PI * 0.75, plates: [7,13,19,23,29,31,37,41] };
  function tickDefender() {
    defender.angle += 0.002;
    defender.x = 140 + Math.cos(defender.angle) * 24;
    defender.z = 80 + Math.sin(defender.angle) * 24;
  }
  // Mecha Entity Alpha
  const mechaAlpha = { x: 104, z: 168, display: 0, tick: 0 };
  function tickMecha() {
    mechaAlpha.tick++;
    if (mechaAlpha.tick % 30 === 0) mechaAlpha.display = (mechaAlpha.display + 1) % 10000;
  }
  let currentBiome = -1;
  let biomeEntryT = 0;
  function drawWorldOverlay(cp, t) {
    const ctx = octx;
    ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
    const biome = getBiome(cp.x, cp.z);
    const biomeNames = ['THE BLOCK', 'VAULT COMPOUND 7', 'THE BETWEEN'];
    const biomeColors = ['#ff44aa', '#ff8800', '#4488ff'];
    if (biome !== currentBiome) { currentBiome = biome; biomeEntryT = t; }
    const elapsed = t - biomeEntryT;
    if (elapsed < 3) {
      ctx.save();
      ctx.globalAlpha = elapsed < 0.5 ? elapsed * 2 : (elapsed > 2 ? (3 - elapsed) : 1);
      ctx.fillStyle = biomeColors[biome];
      ctx.font = 'bold 28px monospace';
      ctx.textAlign = 'center';
      ctx.shadowColor = biomeColors[biome];
      ctx.shadowBlur = 20;
      ctx.fillText(biomeNames[biome], overlayCanvas.width / 2, overlayCanvas.height * 0.3);
      ctx.restore();
    }
    if (biome === BIOME_BLOCK) {
      for (const m of blockMarkers) {
        const sx = (m.x - cp.x) * 2 + overlayCanvas.width / 2;
        const sy = (m.z - cp.z) * 2 + overlayCanvas.height / 2 - 100;
        if (sx < -50 || sx > overlayCanvas.width + 50 || sy < -50 || sy > overlayCanvas.height + 50) continue;
        ctx.fillStyle = `rgba(255,68,170,${(0.5 + 0.5 * Math.sin(t * 2 + m.phase)) * 0.4})`;
        ctx.fillRect(sx - 1.5, sy - 1.5, 3, 3);
      }
      // Defender indicator
      const dx = defender.x - cp.x, dz = defender.z - cp.z;
      const dDist = Math.sqrt(dx * dx + dz * dz);
      if (dDist < 40) {
        const a = Math.atan2(dz, dx);
        const ex = overlayCanvas.width / 2 + Math.cos(a) * 60;
        const ey = overlayCanvas.height / 2 + Math.sin(a) * 60;
        ctx.save();
        ctx.strokeStyle = '#ff44aa';
        ctx.lineWidth = 2;
        ctx.setLineDash([4, 4]);
        ctx.beginPath(); ctx.moveTo(overlayCanvas.width / 2, overlayCanvas.height / 2); ctx.lineTo(ex, ey); ctx.stroke();
        ctx.fillStyle = '#ff44aa';
        ctx.font = '10px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(`DEFENDER [${dDist.toFixed(0)}m]`, ex, ey - 12);
        ctx.restore();
      }
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.font = '10px monospace';
      ctx.textAlign = 'left';
      ctx.fillText('Four corners meet one balance. Every plate carries a filtered number.', 8, overlayCanvas.height - 20);
    } else if (biome === BIOME_VAULT) {
      for (const b of vaultBeacons) {
        const sx = (b.x - cp.x) * 2 + overlayCanvas.width / 2;
        const sy = (b.z - cp.z) * 2 + overlayCanvas.height / 2 - 100;
        if (sx < -50 || sx > overlayCanvas.width + 50 || sy < -50 || sy > overlayCanvas.height + 50) continue;
        const pulse = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(t * 1.43 + b.phase));
        ctx.beginPath();
        ctx.arc(sx, sy, 2 + pulse * 3, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,136,0,${pulse * 0.5})`;
        ctx.fill();
      }
      const mx = mechaAlpha.x - cp.x, mz = mechaAlpha.z - cp.z;
      const mDist = Math.sqrt(mx * mx + mz * mz);
      if (mDist < 40) {
        const a = Math.atan2(mz, mx);
        const ex = overlayCanvas.width / 2 + Math.cos(a) * 60;
        const ey = overlayCanvas.height / 2 + Math.sin(a) * 60;
        ctx.save();
        ctx.strokeStyle = '#ff8800';
        ctx.lineWidth = 2;
        ctx.setLineDash([6, 3]);
        ctx.beginPath(); ctx.moveTo(overlayCanvas.width / 2, overlayCanvas.height / 2); ctx.lineTo(ex, ey); ctx.stroke();
        ctx.fillStyle = '#ff8800';
        ctx.font = '10px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(`α ${mechaAlpha.display} [${mDist.toFixed(0)}m]`, ex, ey - 12);
        ctx.restore();
      }
      const pc = (t * 1.43) % 1 < 0.5 ? '\u25C9' : '\u25CB';
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.font = '10px monospace';
      ctx.textAlign = 'left';
      ctx.fillText(`${pc} Mecha Entity Alpha — computing since 2017`, 8, overlayCanvas.height - 20);
    } else {
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.font = '10px monospace';
      ctx.textAlign = 'left';
      ctx.fillText('The between IS the product. The mistake IS the signal.', 8, overlayCanvas.height - 20);
    }
  }

  // ═══════════════════════════════════════════════════════════════
  // SHELL MODEL GENERATOR — produces Float32Array[6] per brick
  // Uses biome-aware material tensors for The Block, Vault Compound 7, and The Between
  // ═══════════════════════════════════════════════════════════════
  function shellModelGenerator(bx, by, bz) {
    // Convert brick coords to world coords (brick size = 16)
    const worldX = bx * 16;
    const worldZ = bz * 16;
    const mat = getBiomeMaterial(bx, by, bz, worldX, worldZ);
    return new Float32Array(mat);
  }

  // ═══════════════════════════════════════════════════════════════
  // INIT COMPUTE + RENDER PIPELINE
  // ═══════════════════════════════════════════════════════════════
  const base = 'compute';
  const [hermiteWGSL, qefWGSL, lodWGSL, deltaWGSL, topoWGSL, stitchWGSL, editWGSL, renderWGSL] = 
    await Promise.all([
      fetch(`${base}/phase5_extractor/phase5_hermite.wgsl`).then(r => r.text()),
      fetch(`${base}/phase5_extractor/phase5_qef.wgsl`).then(r => r.text()),
      fetch(`${base}/phase5_extractor/phase5_lod.wgsl`).then(r => r.text()),
      fetch(`${base}/phase5_extractor/phase5_delta.wgsl`).then(r => r.text()),
      fetch(`${base}/phase5_extractor/phase5_topology.wgsl`).then(r => r.text()),
      fetch(`${base}/phase5_extractor/phase5_stitch.wgsl`).then(r => r.text()),
      fetch(`${base}/phase6_edit/phase6_edit.wgsl`).then(r => r.text()),
      fetch('render/render_terrain.wgsl').then(r => r.text()),
    ]);

  // Terrain Renderer
  const terrainRenderer = new TerrainRenderer(device, context, depthTexture);
  await terrainRenderer.init(renderWGSL);

  // Compute engine
  const engine = new HyperPolyGeology(device, 256);
  const extractor = new Phase5Extractor(device, 256);
  const draw = new Phase5Draw(device);

  const wgslSources = { hermite: hermiteWGSL, qef: qefWGSL, lod: lodWGSL,
    delta: deltaWGSL, topology: topoWGSL, stitch: stitchWGSL, edit: editWGSL };

  // Upload terrain
  await engine.uploadQuantizedTerrain(shellModelGenerator);

  // Init pipelines
  await extractor.init(wgslSources);
  await draw.init(wgslSources);

  // Initial extraction
  await extractor.fullExtract(engine.metaBuffer, engine.channelBuffers, engine.brickFlagsBuffer);
  await draw.buildMesh(extractor.getVertexBuffer(), extractor.hermiteBuffer, extractor.getLODBuffer(), 0.5);

  // ═══════════════════════════════════════════════════════════════
  // HEIGHT QUERY — Sample the dual-contour mesh at (x, z)
  // Uses the extracted vertex buffer. For now, fallback to the
  // shell model generator's density field for player height.
  // In production: raycast or barycentric lookup.
  // ═══════════════════════════════════════════════════════════════
  function getHeight(x, z) {
    const bx = Math.floor(x / 16); const by = 8; const bz = Math.floor(z / 16);
    if (bx < 0 || bx >= 16 || bz < 0 || bz >= 16) return 0;
    const biome = getBiome(x, z);
    switch (biome) {
      case BIOME_BLOCK:
        // Flat concrete plateau ~2.5 units high
        return 2.3 + Math.sin(x * 0.05) * 0.15 + Math.cos(z * 0.05) * 0.15;
      case BIOME_VAULT:
        // Metal platform with structural pillars
        return 2.0 + Math.sin(x * 0.15) * 0.2 + Math.cos(z * 0.15) * 0.2
             + (Math.floor(x / 8) % 2 === 0 && Math.floor(z / 8) % 2 === 0 ? 0.8 : 0);
      default:
        // The Between — rolling terrain
        return Math.sin((x + 50) * 0.1) * Math.cos((z + 50) * 0.1) * 2.5
             + Math.sin((x + 50) * 0.4) * 0.3;
    }
  }

  // ═══════════════════════════════════════════════════════════════
  // FIRST-PERSON CAMERA (ported from Chaotic Terrain demo)
  // ═══════════════════════════════════════════════════════════════
  const keys = {};
  let yaw = 0, pitch = 0;
  let isLocked = false;
  let vel = new THREE.Vector3();
  const fwd = new THREE.Vector3();
  const side = new THREE.Vector3();
  const ACCEL = 0.08, FRICTION = 0.88;

  document.addEventListener('keydown', e => { keys[e.code] = true; });
  document.addEventListener('keyup', e => { keys[e.code] = false; });
  document.addEventListener('mousemove', e => {
    if (!isLocked) return;
    yaw -= e.movementX * 0.002;
    pitch -= e.movementY * 0.002;
    pitch = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, pitch));
  });
  document.addEventListener('pointerlockchange', () => {
    isLocked = document.pointerLockElement === wgpuCanvas;
    document.getElementById('hud').style.display = isLocked ? 'block' : 'none';
    document.getElementById('crosshair').style.display = isLocked ? 'block' : 'none';
  });

  window.startScene = () => {
    document.getElementById('overlay').style.display = 'none';
    wgpuCanvas.requestPointerLock();
  };

  wgpuCanvas.addEventListener('click', () => {
    if (document.getElementById('overlay').style.display === 'none')
      wgpuCanvas.requestPointerLock();
  });

  // ═══════════════════════════════════════════════════════════════
  // VIEW-PROJECTION MATRIX (matches camera.position/rotation)
  // ═══════════════════════════════════════════════════════════════
  function getViewProj(pos, yawAngle, pitchAngle) {
    const aspect = window.innerWidth / window.innerHeight;
    const fov = 65 * Math.PI / 180;
    const near = 0.1, far = DRAW_DIST;
    const t = Math.tan(fov / 2);
    
    const proj = new Float32Array(16);
    proj[0] = 1 / (aspect * t); proj[1] = 0; proj[2] = 0; proj[3] = 0;
    proj[4] = 0; proj[5] = 1 / t; proj[6] = 0; proj[7] = 0;
    proj[8] = 0; proj[9] = 0; proj[10] = -(far + near) / (far - near); proj[11] = -1;
    proj[12] = 0; proj[13] = 0; proj[14] = -2 * far * near / (far - near); proj[15] = 0;

    // Camera → world matrix from yaw/pitch
    const cosY = Math.cos(yawAngle), sinY = Math.sin(yawAngle);
    const cosP = Math.cos(pitchAngle), sinP = Math.sin(pitchAngle);
    
    // Forward: (sinY * cosP, sinP, cosY * cosP)
    // Right:   (cosY, 0, -sinY)
    // Up:      (-sinY * sinP, cosP, -cosY * sinP)
    const fx = sinY * cosP, fy = sinP, fz = cosY * cosP;
    const rx = cosY, ry = 0, rz = -sinY;
    const ux = -sinY * sinP, uy = cosP, uz = -cosY * sinP;

    const view = new Float32Array(16);
    view[0] = rx; view[1] = ux; view[2] = -fx; view[3] = 0;
    view[4] = ry; view[5] = uy; view[6] = -fy; view[7] = 0;
    view[8] = rz; view[9] = uz; view[10] = -fz; view[11] = 0;
    view[12] = -(rx * pos.x + ry * pos.y + rz * pos.z);
    view[13] = -(ux * pos.x + uy * pos.y + uz * pos.z);
    view[14] =  (fx * pos.x + fy * pos.y + fz * pos.z);
    view[15] = 1;

    const vp = new Float32Array(16);
    for (let row = 0; row < 4; row++) {
      for (let col = 0; col < 4; col++) {
        vp[col * 4 + row] =
          proj[row] * view[col * 4] +
          proj[row + 4] * view[col * 4 + 1] +
          proj[row + 8] * view[col * 4 + 2] +
          proj[row + 12] * view[col * 4 + 3];
      }
    }
    return vp;
  }

  // ═══════════════════════════════════════════════════════════════
  // FRAME LOOP
  // ═══════════════════════════════════════════════════════════════
  let frame = 0;
  let lastFrameTime = 0;
  let fpsCount = 0, fpsTime = 0;
  let displayFps = 0;

  // Position the camera at a known good starting point
  cam.position.set(WORLD / 2, 4, WORLD / 2);

  function animate(time) {
    requestAnimationFrame(animate);
    frame++;
    const dt = Math.min((time - (frame === 1 ? time : lastFrameTime)) / 1000, 0.05);
    lastFrameTime = time;
    const t = time * 0.001;

    // ── Update THREE camera from WASD input ──
    fwd.set(Math.sin(yaw), 0, Math.cos(yaw));
    side.set(fwd.z, 0, -fwd.x);
    if (keys['KeyW']) vel.addScaledVector(fwd, ACCEL);
    if (keys['KeyS']) vel.addScaledVector(fwd, -ACCEL);
    if (keys['KeyA']) vel.addScaledVector(side, -ACCEL);
    if (keys['KeyD']) vel.addScaledVector(side, ACCEL);
    vel.multiplyScalar(FRICTION);
    cam.position.add(vel);

    // World wrapping (seamless)
    cam.position.x = ((cam.position.x % WORLD) + WORLD) % WORLD;
    cam.position.z = ((cam.position.z % WORLD) + WORLD) % WORLD;

    // Ground clamp
    const groundH = getHeight(cam.position.x, cam.position.z);
    const waveH = WATER_LEVEL + Math.sin(t * 1.5 + cam.position.x * 0.3) * 0.05;
    const surfaceH = Math.max(groundH, waveH);
    cam.position.y += (surfaceH + 1.7 - cam.position.y) * 0.1;

    cam.rotation.order = 'YXZ';
    cam.rotation.y = yaw;
    cam.rotation.x = pitch;

    // Underwater overlay
    const underwaterEl = document.getElementById('underwater-overlay');
    underwaterEl.style.display = cam.position.y < waveH + 0.2 ? 'block' : 'none';

    // ── Update WebGPU terrain renderer ──
    const vp = getViewProj(cam.position, yaw, pitch);
    terrainRenderer.setViewProj(vp, [cam.position.x, cam.position.y, cam.position.z], t);

    const encoder = device.createCommandEncoder();
    terrainRenderer.render(encoder, extractor.getVertexBuffer(), draw);
    device.queue.submit([encoder.finish()]);

    // Compare with previous frame for lighting transitions
    const cameraBiome = getBiome(cam.position.x, cam.position.z);
    updateBiomeLighting(cameraBiome, t);

    // ── Three.js overlay rendering ──
    if (frame % 2 === 0) animateWater(t);
    animateRain(cam.position);
    tickLightning();
    renderer.render(scene, cam);

    // ── World overlay (The Block / Vault Compound 7 markers) ──
    tickDefender();
    tickMecha();
    drawWorldOverlay(cam.position, t);

    // ── HUD ──
    fpsCount++;
    fpsTime += dt;
    if (fpsTime >= 0.5) {
      displayFps = Math.round(fpsCount / fpsTime);
      fpsCount = 0; fpsTime = 0;
    }
    const biomeNames = ['THE BLOCK', 'VAULT CMPD 7', 'THE BETWEEN'];
    document.getElementById('hud-pos').textContent = `POS: ${cam.position.x.toFixed(0)}, ${cam.position.z.toFixed(0)}`;
    document.getElementById('hud-elev').textContent = `ELEV: ${(cam.position.y - surfaceH).toFixed(1)}`;
    document.getElementById('hud-biome').textContent = `BIOME: ${biomeNames[cameraBiome]}`;
    document.getElementById('hud-fps').textContent = displayFps;
  }

  // ═══════════════════════════════════════════════════════════════
  // RESIZE
  // ═══════════════════════════════════════════════════════════════
  window.addEventListener('resize', () => {
    const w = window.innerWidth, h = window.innerHeight;
    wgpuCanvas.width = w; wgpuCanvas.height = h;
    renderer.setSize(w, h);
    cam.aspect = w / h;
    cam.updateProjectionMatrix();
  });

  // ═══════════════════════════════════════════════════════════════
  // LAUNCH
  // ═══════════════════════════════════════════════════════════════
  document.getElementById('loader').style.display = 'none';
  requestAnimationFrame(animate);
}

main().catch(err => {
  console.error(err);
  document.getElementById('loader').textContent = `Error: ${err.message}`;
});
</script>
</body>
</html>
